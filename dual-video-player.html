<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Video Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
    .upload-section { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .upload-box { background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; }
    .upload-box input { margin-top: 10px; }
    .video-container { display: flex; gap: 10px; margin-bottom: 15px; }
    .video-wrapper { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
    .video-wrapper.primary { flex: 2; }
    .video-wrapper video { width: 100%; display: block; cursor: pointer; }
    .video-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
    .controls { background: #2a2a2a; padding: 15px; border-radius: 8px; }
    .controls-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .controls-row:last-child { margin-bottom: 0; }
    button { background: #4a4a4a; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #5a5a5a; }
    button.active { background: #0066cc; }
    .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 12px; background: #4a4a4a; border-radius: 4px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: #0066cc; border-radius: 4px; width: 0%; pointer-events: none; }
    .time-display { font-size: 0.9rem; min-width: 100px; text-align: center; }
    .speed-btns button { padding: 8px 12px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dual Video Player</h1>
    
    <div class="upload-section">
      <div class="upload-box">
        <label>Video 1 (Left/Primary):</label>
        <input type="file" id="file1" accept="video/mp4">
      </div>
      <div class="upload-box">
        <label>Video 2 (Right/Secondary):</label>
        <input type="file" id="file2" accept="video/mp4">
      </div>
    </div>

    <div class="video-container" id="videoContainer">
      <div class="video-wrapper primary" id="wrapper1">
        <span class="video-label">Video 1</span>
        <video id="video1" playsinline></video>
      </div>
      <div class="video-wrapper" id="wrapper2">
        <span class="video-label">Video 2</span>
        <video id="video2" playsinline></video>
      </div>
    </div>

    <div class="controls">
      <div class="controls-row progress-container">
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="controls-row">
        <button id="playPause">▶ Play</button>
        <button id="stop">⏹ Stop</button>
        <button id="swap">⇄ Swap Videos</button>
        <button id="toggleSize">↔ Toggle Primary</button>
      </div>
      <div class="controls-row speed-btns">
        <span>Speed:</span>
        <button data-speed="0.5">0.5x</button>
        <button data-speed="1" class="active">1x</button>
        <button data-speed="1.25">1.25x</button>
        <button data-speed="1.5">1.5x</button>
        <button data-speed="2">2x</button>
      </div>
      <div class="controls-row">
        <span>Size:</span>
        <button id="sizeSmall">Small</button>
        <button id="sizeMedium" class="active">Medium</button>
        <button id="sizeLarge">Large</button>
        <button id="fullscreen">⛶ Fullscreen</button>
      </div>
    </div>
  </div>

  <script>
    const v1 = document.getElementById('video1'), v2 = document.getElementById('video2');
    const w1 = document.getElementById('wrapper1'), w2 = document.getElementById('wrapper2');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    let primary = v1;

    document.getElementById('file1').onchange = e => { if(e.target.files[0]) v1.src = URL.createObjectURL(e.target.files[0]); };
    document.getElementById('file2').onchange = e => { if(e.target.files[0]) v2.src = URL.createObjectURL(e.target.files[0]); };

    const sync = () => { if(Math.abs(v1.currentTime - v2.currentTime) > 0.1) v2.currentTime = v1.currentTime; };
    const fmt = t => `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;

    document.getElementById('playPause').onclick = () => {
      if(v1.paused) { sync(); v1.play(); v2.play(); }
      else { v1.pause(); v2.pause(); }
    };

    document.getElementById('stop').onclick = () => {
      v1.pause(); v2.pause(); v1.currentTime = v2.currentTime = 0;
    };

    document.getElementById('swap').onclick = () => {
      const container = document.getElementById('videoContainer');
      container.insertBefore(w2, w1);
      [w1.className, w2.className] = [w2.className, w1.className];
    };

    document.getElementById('toggleSize').onclick = () => {
      w1.classList.toggle('primary');
      w2.classList.toggle('primary');
      primary = w1.classList.contains('primary') ? v1 : v2;
    };

    document.querySelectorAll('[data-speed]').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        v1.playbackRate = v2.playbackRate = parseFloat(btn.dataset.speed);
      };
    });

    document.getElementById('progressBar').onclick = e => {
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if(v1.duration) v1.currentTime = v2.currentTime = pct * v1.duration;
    };

    const setSize = (max, btn) => {
      document.querySelector('.container').style.maxWidth = max;
      document.querySelectorAll('#sizeSmall,#sizeMedium,#sizeLarge').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    document.getElementById('sizeSmall').onclick = e => setSize('1000px', e.target);
    document.getElementById('sizeMedium').onclick = e => setSize('1400px', e.target);
    document.getElementById('sizeLarge').onclick = e => setSize('100%', e.target);
    document.getElementById('fullscreen').onclick = () => document.getElementById('videoContainer').requestFullscreen();

    v1.ontimeupdate = () => {
      progressFill.style.width = (v1.currentTime / v1.duration * 100) + '%';
      timeDisplay.textContent = `${fmt(v1.currentTime)} / ${fmt(v1.duration || 0)}`;
      sync();
    };

    v1.onplay = v2.onplay = () => document.getElementById('playPause').textContent = '⏸ Pause';
    v1.onpause = v2.onpause = () => document.getElementById('playPause').textContent = '▶ Play';

    [v1, v2].forEach(v => v.onclick = () => {
      if(v1.paused) { sync(); v1.play(); v2.play(); }
      else { v1.pause(); v2.pause(); }
    });
  </script>
</body>
</html>
